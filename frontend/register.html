<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Premium Travel Planner</title>

    <link rel="stylesheet" href="style.css">
</head>

<body class="register-page">

<div class="register-container">

    <div class="left-register">

        <h1>Premium Travel Planner</h1>

        <p>Create your account and start your journey with AI.</p>

    </div>

    <div class="right-register">

        <h2>Create Account</h2>

        <input type="text" id="fullname" placeholder="Full Name">

        <input type="email" id="email" placeholder="Email Address">

        <input type="tel" id="mobile" placeholder="Mobile Number">

        <input type="password" id="password" placeholder="Password">

        <input type="password" id="confirmPassword" placeholder="Confirm Password">

        <button type="button" onclick="registerUser()">Create Account</button>

        <p id="registerMessage"></p>

        <p>Already have an account?</p>

        <a href="login.html">Login</a>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
